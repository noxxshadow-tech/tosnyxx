<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyxx — Legal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --border: #1e2330;
    --accent: #5865f2;
    --accent2: #eb459e;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #e8eaf0;
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  .logo {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .sub {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: #6b7280;
    letter-spacing: 0.05em;
    margin-bottom: 3rem;
  }

  .cards {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .card {
    display: block;
    width: 220px;
    padding: 1.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
  }

  .card.tos::before { background: var(--accent); }
  .card.privacy::before { background: var(--accent2); }

  .card:hover {
    transform: translateY(-4px);
  }

  .card.tos:hover { border-color: var(--accent); }
  .card.privacy:hover { border-color: var(--accent2); }

  .card-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.4rem;
  }

  .card-desc {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: #6b7280;
    letter-spacing: 0.03em;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo">● Nyxx · Bot Discord</div>
  <h1>Legal</h1>
  <p class="sub">App ID: 1446084663763271690</p>

  <div class="cards">
    <a href="tos.html" class="card tos">
      <div class="card-icon">📋</div>
      <div class="card-title">Conditions d'Utilisation</div>
      <div class="card-desc">Terms of Service<br>Mis à jour Mars 2025</div>
    </a>
    <a href="privacy.html" class="card privacy">
      <div class="card-icon">🔒</div>
      <div class="card-title">Politique de Confidentialité</div>
      <div class="card-desc">Privacy Policy<br>Mis à jour Mars 2025</div>
    </a>
  </div>
</div>
</body>
</html>
